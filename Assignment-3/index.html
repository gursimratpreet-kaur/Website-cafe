<body>
    <main>
        <form>
            <fieldset>
            <fieldset id="firstfield">

                <legend>Choose a Tea Type</legend>
                <input type="radio" name="teaChoice" value="Breakfast"/>Breakfast<br>
                <input type="radio" name="teaChoice" value="Jasmine" checked/>Jasmine<br>
                <input type="radio" name="teaChoice" value="Green"/>Green
            </fieldset>
            <fieldset id="thirdfield">
                <legend>Choose a Size</legend>
                <select name="drinkSize">
                    <option value="Small">Small</option>
                    <option value="Medium">Medium</option>
                    <option value="Large">Large</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Choose a Dessert</legend>
                <input type="checkbox" name="chkDessert" value="Cookie">Cookie<br>
                <input type="checkbox" name="chkDessert" value="Muffin">Muffin
            </fieldset>
            <fieldset>
                <legend>Beverage Chosen</legend>
                <fieldset id="txtDisplay">
                    Small Jasmine Tea
                </fieldset>
            </fieldset>
            <input type="button" value="Add Order" id="addOrder" />
        </fieldset>
